name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write   # required for electron-builder to create GitHub release

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_cmd: build:linux
          - os: windows-latest
            build_cmd: build:win
          - os: macos-latest
            build_cmd: build:mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # node-gyp uses Python to compile better-sqlite3 when no prebuilt binary
      # exists for the target Electron version. Python 3.12+ removed distutils
      # from the stdlib; pin 3.11 (last version that includes it) so the build
      # works regardless of what the runner ships.
      - name: Setup Python 3.11 (node-gyp needs distutils)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.GITHUB_OAUTH_CLIENT_ID }}
        run: npm run ${{ matrix.build_cmd }}
